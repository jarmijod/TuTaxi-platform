name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taxi_user
          POSTGRES_PASSWORD: taxi_password
          POSTGRES_DB: taxi_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd apps/backend && npm ci

      - name: Generate Prisma Client
        run: cd apps/backend && npx prisma generate

      - name: Lint backend
        run: cd apps/backend && npm run lint

      - name: Build backend
        run: cd apps/backend && npm run build
        env:
          DATABASE_URL: postgresql://taxi_user:taxi_password@localhost:5432/taxi_platform

      - name: Run tests
        run: cd apps/backend && npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://taxi_user:taxi_password@localhost:5432/taxi_platform
          JWT_SECRET: test-secret
          REDIS_URL: redis://localhost:6379

      - name: Install frontend dependencies
        run: cd apps/frontend && npm ci

      - name: Build frontend
        run: cd apps/frontend && npm run build
